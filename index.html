<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stark Tech Hologram Mainframe</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #02060b;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* Pure Floating Hologram Interface - NO SQUARE BORDER */
        .hologram-ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85vw;
            max-width: 900px;
            height: 60vh;
            z-index: 10;
            color: #00f2ff;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            transition: transform 0.1s ease-out;
        }

        h1 {
            font-size: 1.5rem;
            color: #00f2ff;
            text-shadow: 0 0 25px rgba(0, 242, 255, 0.9);
            margin-top: 0;
            letter-spacing: 4px;
            text-align: center;
        }

        #terminal-body {
            flex-grow: 1;
            overflow-y: auto;
            margin-top: 30px;
            text-align: center;
        }

        .log-line {
            margin: 12px 0;
            line-height: 1.6;
            font-size: 1.1rem;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.85);
            font-weight: bold;
        }

        .prompt {
            color: #ffaa00;
            text-shadow: 0 0 10px rgba(255, 170, 0, 0.7);
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background-color: #00f2ff;
            animation: blink 0.8s infinite;
            vertical-align: middle;
            margin-left: 5px;
            box-shadow: 0 0 15px #00f2ff;
        }

        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="hologram-ui" id="terminal-card">
        <h1>⚙️ STARK SYSTEMS: MARK-LXXXV INTERFACE ACTIVATED</h1>
        <div id="terminal-body">
            <div id="log-wrapper"></div>
            <p style="font-size: 1.2rem;">
                <span class="prompt">rogue-shindecore@root:~#</span> 
                <span id="typing-field"></span><span class="cursor"></span>
            </p>
        </div>
    </div>

    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 35;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const particleCount = 2500;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount * 3; i += 3) {
            positions[i] = (Math.random() - 0.5) * 95;
            positions[i+1] = (Math.random() - 0.5) * 95;
            positions[i+2] = (Math.random() - 0.5) * 95;

            const rand = Math.random();
            if (rand > 0.4) {
                colors[i] = 0.0; colors[i+1] = 0.85; colors[i+2] = 1.0;
            } else if (rand > 0.1) {
                colors[i] = 0.05; colors[i+1] = 0.3; colors[i+2] = 0.85;
            } else {
                colors[i] = 1.0; colors[i+1] = 1.0; colors[i+2] = 1.0;
            }
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.22,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        let mouseX = 0, mouseY = 0;
        const terminalCard = document.getElementById('terminal-card');

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
            terminalCard.style.transform = `translate(-50%, -50%) rotateY(${mouseX * 18}deg) rotateX(${-mouseY * 18}deg)`;
        });

        function animate() {
            requestAnimationFrame(animate);
            particleSystem.rotation.x += 0.0018;
            particleSystem.rotation.y += 0.0022;
            particleSystem.rotation.x += (mouseY * 0.05 - particleSystem.rotation.x) * 0.05;
            particleSystem.rotation.y += (mouseX * 0.05 - particleSystem.rotation.y) * 0.05;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const logData = [
            "⚡ [ONLINE] ARC CORE DIAGNOSTICS DETECTED COMPLETION.",
            "🛡️ [PROXIMITY] GLOBAL BACKLOG SYSTEM SYNC COMPLETED.",
            "🧠 [AI INTEGRATION] MAIN NEURAL HUB DEPLOYED...",
            "🟩 [STARK TECH] DEPLOYMENT STABLE. STANDING BY, SIR."
        ];

        const logWrapper = document.getElementById('log-wrapper');
        const typingField = document.getElementById('typing-field');
        let dataIndex = 0;

        function runTerminal() {
            if (dataIndex < logData.length) {
                let textStr = logData[dataIndex];
                let cIndex = 0;
                typingField.innerText = "";

                const interval = setInterval(() => {
                    if (cIndex < textStr.length) {
                        typingField.innerText += textStr.charAt(cIndex);
                        cIndex++;
                    } else {
                        clearInterval(interval);
                        const div = document.createElement('div');
                        div.className = 'log-line';
                        div.innerHTML = `<span>${textStr}</span>`;
                        logWrapper.appendChild(div);
                        dataIndex++;
                        setTimeout(runTerminal, 500);
                    }
                }, 25);
            } else {
                typingField.innerText = "ARC REACTOR SYNCED. SHADOW PROTOCOL IS LIVE.";
            }
        }
        setTimeout(runTerminal, 800);
    </script>
</body>
</html>
