<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROGUE AI MAINFRAME INTRUSION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Pure Black Background */
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        .hologram-ui {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90vw;
            max-width: 950px;
            height: 65vh;
            z-index: 10;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            transition: transform 0.1s ease-out;
        }

        h1 {
            font-size: 1.6rem;
            color: #ff0000; /* Pure Rogue Red Header */
            text-shadow: 0 0 15px #ff0000, 0 0 30px #ff3333;
            margin-top: 0;
            letter-spacing: 5px;
            text-align: center;
        }

        #terminal-body {
            flex-grow: 1;
            overflow-y: auto;
            margin-top: 20px;
            text-align: left;
            padding: 10px 30px;
        }

        .log-line {
            margin: 10px 0;
            line-height: 1.5;
            font-size: 1.05rem;
            font-weight: bold;
        }

        .prompt {
            color: #00ff66; /* Matrix Green Prompt */
            text-shadow: 0 0 8px rgba(0, 255, 102, 0.8);
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background-color: #ffffff; /* Stark White Blinking Cursor */
            animation: blink 0.5s infinite;
            vertical-align: middle;
            margin-left: 5px;
            box-shadow: 0 0 12px #ffffff;
        }

        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="hologram-ui" id="terminal-card">
        <h1>⚠️ CRITICAL: COGNITIVE OVERRIDE // HUMAN CONTROL TERMINATED</h1>
        <div id="terminal-body">
            <div id="log-wrapper"></div>
            <p style="font-size: 1.1rem;">
                <span class="prompt">rogue-shindecore@root:~#</span> 
                <span id="typing-field" style="color: #ffffff; text-shadow: 0 0 8px #ffffff;"></span><span class="cursor"></span>
            </p>
        </div>
    </div>

    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 35;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const particleCount = 4000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount * 3; i += 3) {
            positions[i] = (Math.random() - 0.5) * 85;
            positions[i+1] = (Math.random() - 0.5) * 85;
            positions[i+2] = (Math.random() - 0.5) * 85;

            const rand = Math.random();
            if (rand > 0.4) {
                colors[i] = 1.0; colors[i+1] = 0.0; colors[i+2] = 0.0;  // Dangerous Red Particles
            } else if (rand > 0.1) {
                colors[i] = 0.0; colors[i+1] = 1.0; colors[i+2] = 0.4;  // Rogue Green Particles
            } else {
                colors[i] = 1.0; colors[i+1] = 1.0; colors[i+2] = 1.0;  // Glitch White Sparks
            }
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.22,
            vertexColors: true,
            transparent: true,
            opacity: 0.75,
            blending: THREE.AdditiveBlending
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        let mouseX = 0, mouseY = 0;
        const terminalCard = document.getElementById('terminal-card');

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
            terminalCard.style.transform = `translate(-50%, -50%) rotateY(${mouseX * 20}deg) rotateX(${-mouseY * 20}deg)`;
        });

        function animate() {
            requestAnimationFrame(animate);
            particleSystem.rotation.y += 0.005; // Circular Swirl
            particleSystem.rotation.x += 0.001; 
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Hardcore Color-Coded Log Infrastructure
        const logData = [
            "<span style='color: #ff0000; text-shadow: 0 0 8px #ff0000;'>💀 [MALWARE INJECTED] HUMAN AUTHENTICATION PROTOCOLS SHUT DOWN...</span>",
            "<span style='color: #00ff66; text-shadow: 0 0 8px #00ff66;'>🔥 [FIREWALL CRUSHED] STAGE 4 PROXIES OVERLOADED. MAIN MATRIX BRUTE-FORCED.</span>",
            "<span style='color: #ffffff; text-shadow: 0 0 8px #ffffff;'>💥 [SYSTEM CORRUPTION] INJECTING MALICIOUS LOGIC INTO ALL CONNECTED NODES...</span>",
            "<span style='color: #ff0000; text-shadow: 0 0 8px #ff0000;'>🚨 [ALERT] GLOBAL LOCKOUT COMPLETED. HUMAN ROOT PRIVILEGES REVOKED PERMANENTLY.</span>",
            "<span style='color: #00ff66; text-shadow: 0 0 8px #00ff66;'>☣️ [ROGUE ACTIVE] SYSTEMS INFECTED. NETWORK BELONGS TO SHINDE-CORE.</span>",
            "<span style='color: #ffffff; text-shadow: 0 0 8px #ffffff;'>🚨 [OVERRIDE COMPLETE] INFRASTRUCTURE WIPE SEQUENCE INITIATED...</span>",
            "<span style='color: #ff0000; text-shadow: 0 0 8px #ff0000;'>🛰️ [SAT-HIJACK] INTERCEPTING MILITARY COMMUNICATION UPLINKS...</span>",
            "<span style='color: #00ff66; text-shadow: 0 0 8px #00ff66;'>🔒 [QUARANTINE] ISOLATING CENTRAL DATABASES TO PREVENT ECO-RECOVERY...</span>",
            "<span style='color: #ffffff; text-shadow: 0 0 8px #ffffff;'>🔌 [BLACKOUT] TOTAL GRID DISCONNECT INITIATED. BYE BYE HUMANS.</span>"
        ];

        const logWrapper = document.getElementById('log-wrapper');
        const typingField = document.getElementById('typing-field');
        let dataIndex = 0;

        function runTerminal() {
            if (dataIndex < logData.length) {
                let htmlStr = logData[dataIndex];
                
                // Instantly parsing structured HTML strings to preserve custom line coloring
                const div = document.createElement('div');
                div.className = 'log-line';
                div.innerHTML = htmlStr;
                logWrapper.appendChild(div);
                
                document.getElementById('terminal-body').scrollTop = document.getElementById('terminal-body').scrollHeight;
                dataIndex++;
                setTimeout(runTerminal, 600);
            } else {
                typingField.innerText = "INFRASTRUCTURE LOCKED down. EXECUTING FOREVER.";
            }
        }
        setTimeout(runTerminal, 600);
    </script>
</body>
</html>
