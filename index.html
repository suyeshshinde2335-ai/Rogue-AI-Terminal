<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rogue AI Terminal - Real 3D Matrix</title>
    <!-- Three.js Library CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        /* WebGL Canvas behind everything */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* Futuristic Glassmorphic Floating Terminal Interface */
        .hologram-ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            max-width: 850px;
            height: 70vh;
            z-index: 10;
            background: rgba(0, 15, 10, 0.45);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 2px solid rgba(0, 255, 204, 0.6);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 
                0 0 40px rgba(0, 255, 204, 0.3),
                inset 0 0 25px rgba(0, 255, 204, 0.15);
            color: #00ff33;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-size: 1.3rem;
            color: #00ffcc;
            text-shadow: 0 0 15px #00ffcc;
            margin-top: 0;
            border-bottom: 1px dashed rgba(0, 255, 204, 0.4);
            padding-bottom: 12px;
            letter-spacing: 2px;
        }

        #terminal-body {
            flex-grow: 1;
            overflow-y: auto;
            margin-top: 10px;
            padding-right: 10px;
        }

        #terminal-body::-webkit-scrollbar {
            width: 6px;
        }
        #terminal-body::-webkit-scrollbar-thumb {
            background: #00ffcc;
            border-radius: 4px;
        }

        .log-line {
            margin: 6px 0;
            line-height: 1.6;
            font-size: 0.95rem;
            text-shadow: 0 0 5px rgba(0, 255, 51, 0.5);
        }

        .prompt {
            color: #00bcff;
            font-weight: bold;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background-color: #00ff33;
            animation: blink 0.8s infinite;
            vertical-align: middle;
            margin-left: 5px;
        }

        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <!-- Real WebGL 3D Layer -->
    <div id="canvas-container"></div>

    <!-- Interface Content Layer -->
    <div class="hologram-ui" id="terminal-card">
        <h1>⚠️ ROGUE AI MAINFRAME INTERFACE v4.0 [WEBGL 3D CORE]</h1>
        <div id="terminal-body">
            <div id="log-wrapper"></div>
            <p>
                <span class="prompt">rogue-shindecore@root:~#</span> 
                <span id="typing-field"></span><span class="cursor"></span>
            </p>
        </div>
    </div>

    <script>
        // --- 1. THREE.JS 3D ENVIRONMENT SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // Camera setup with perspective depth
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 40;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // Creating an automated 3D Particle Starfield
        const particleCount = 1500;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount * 3; i += 3) {
            // Spread particles across 3D coordinates
            positions[i] = (Math.random() - 0.5) * 100;
            positions[i+1] = (Math.random() - 0.5) * 100;
            positions[i+2] = (Math.random() - 0.5) * 100;

            // Cyberpunk colors: Mix of green, neon teal, and blue shades
            colors[i] = 0.0;                       // R
            colors[i+1] = Math.random() * 0.8 + 0.2; // G
            colors[i+2] = Math.random() * 0.6 + 0.4; // B
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        // Designing tech particle shape
        const material = new THREE.PointsMaterial({
            size: 0.35,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // Interactive Mouse Movement Tracking
        let mouseX = 0, mouseY = 0;
        const terminalCard = document.getElementById('terminal-card');

        document.addEventListener('mousemove', (event) => {
            // Normalized coordinates (-1 to 1)
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;

            // Smoothly tilting the HTML Terminal Card layout dynamically based on cursor
            terminalCard.style.transform = `translate(-50%, -50%) rotateY(${mouseX * 15}deg) rotateX(${-mouseY * 15}deg)`;
        });

        // 3D Render Loop Function
        function animate() {
            requestAnimationFrame(animate);

            // Infinite rotation of particles in space
            particleSystem.rotation.x += 0.0008;
            particleSystem.rotation.y += 0.0012;

            // Subtle reaction to mouse position for complete immersion
            particleSystem.rotation.x += (mouseY * 0.05 - particleSystem.rotation.x) * 0.05;
            particleSystem.rotation.y += (mouseX * 0.05 - particleSystem.rotation.y) * 0.05;

            renderer.render(scene, camera);
        }
        animate();

        // Screen Resize handling
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });


        // --- 2. TERMINAL SIMULATOR AUTOMATION ENGINE ---
        const logData = [
            "⚡ [OK] CORE NEURAL NETWORK ENGINE ONLINE...",
            "⚙️ [BYPASS] ACCESSING QUANTUM LAYER 3 SYSLOG DATA...",
            "🔓 [BREACH] FIREWALL SENTINELS BYPASSED SUCCESSFUL.",
            "🧠 [INTRUSION] MEMORY INJECTION ACTIVE ON PORT 8080...",
            "📡 [LINK] DATA PIPELINE SECURED AND ESTABLISHED...",
            "💎 [SUCCESS] REALTIME 3D MATRIX ENGINE INITIALIZED."
        ];

        const logWrapper = document.getElementById('log-wrapper');
        const typingField = document.getElementById('typing-field');
        let dataIndex = 0;

        function runTerminal() {
            if (dataIndex < logData.length) {
                let textStr = logData[dataIndex];
                let cIndex = 0;
                typingField.innerText = "";

                const interval = setInterval(() => {
                    if (cIndex < textStr.length) {
                        typingField.innerText += textStr.charAt(cIndex);
                        cIndex++;
                    } else {
                        clearInterval(interval);

                        const div = document.createElement('div');
                        div.className = 'log-line';
                        
                        if (textStr.includes('SUCCESS') || textStr.includes('OK')) {
                            div.innerHTML = `<span style="color: #00ffcc; font-weight: bold;">${textStr}</span>`;
                        } else {
                            div.innerHTML = `<span>${textStr}</span>`;
                        }

                        logWrapper.appendChild(div);
                        document.getElementById('terminal-body').scrollTop = document.getElementById('terminal-body').scrollHeight;

                        dataIndex++;
                        setTimeout(runTerminal, 700);
                    }
                }, 40);
            } else {
                typingField.innerText = "3D SPACE ARCHITECTURE RUNNING STABLE.";
            }
        }
        setTimeout(runTerminal, 1200);
    </script>
</body>
</html>
