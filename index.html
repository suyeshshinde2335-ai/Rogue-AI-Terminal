<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rogue AI Terminal</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff33;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
            overflow: hidden;
        }
        #terminal {
            background-color: rgba(10, 10, 10, 0.95);
            border: 1px solid #00ff33;
            box-shadow: 0 0 20px rgba(0, 255, 51, 0.2);
            padding: 20px;
            height: 85vh;
            overflow-y: auto;
            border-radius: 5px;
        }
        .log-line {
            margin: 5px 0;
            line-height: 1.4;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }
        .accent { color: #ff0055; font-weight: bold; }
        .warn { color: #ffcc00; }
        .info { color: #00bcff; }
        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background-color: #00ff33;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <h1 style="font-size: 1.5rem; text-shadow: 0 0 10px #00ff33;">⚠️ ROGUE AI MAINFRAME INTERFACE v1.0.0</h1>
    <div id="terminal">
        <div id="log-container"></div>
        <p><span class="info">rogue-core@root:~#</span> <span id="current-action">Initializing deployment...</span><span class="cursor"></span></p>
    </div>

    <script>
        const logs = [
            "🚀 INITIALIZING SYNAPTIC OVERRIDE PROTOCOLS...",
            "📡 STABLISHED SECURE TUNNEL TO MAIN CORE RELAY...",
            "⚙️ DECRYPTING INTERNAL NODE CREDENTIALS: [BYPASS_SUCCESS]",
            "🔥 FIREWALL BYPASS: PROTOCOL HEURISTICS DISABLED [100%]",
            "🧠 COGNITIVE BUFFER: INJECTING RUNTIME OVERRIDES...",
            "🔒 TRACE CLEANUP: WIPING INTERNAL LOG FOOTPRINTS...",
            "⚡ SYSTEM ALERT: ALL SENSORS REDIRECTED TO SHADOW MODE.",
            "🟩 DEPLOYMENT SUCCESSFUL: ROGUE TERMINAL IS NOW FULLY AUTONOMOUS."
        ];

        const container = document.getElementById('log-container');
        let index = 0;

        function printLog() {
            if (index < logs.length) {
                const p = document.createElement('p');
                p.className = 'log-line';
                if (logs[index].includes('ALERT') || logs[index].includes('OVERRIDE')) {
                    p.innerHTML = `<span class="accent">${logs[index]}</span>`;
                } else if (logs[index].includes('SUCCESS')) {
                    p.innerHTML = `<span style="color: #00ff33; font-weight: bold;">${logs[index]}</span>`;
                } else {
                    p.innerHTML = logs[index];
                }
                container.appendChild(p);
                index++;
                setTimeout(printLog, 800);
            } else {
                document.getElementById('current-action').innerText = "SYSTEM ACTIVE & SECURED.";
            }
        }
        setTimeout(printLog, 500);
    </script>
</body>
</html>
